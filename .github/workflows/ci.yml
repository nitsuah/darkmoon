name: CI

on:
  push:
    branches: [main, phase-5]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    env:
      VITEST_MAX_WORKERS: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build-test-lint
    env:
      VITEST_MAX_WORKERS: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build app
        run: npm run build

      - name: Start dev server
        run: docker compose -f config/docker-compose.yml --profile test up -d test

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:4444 > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run Playwright E2E tests
        run: npx playwright test e2e/smoke.spec.ts

      - name: Stop dev server
        run: docker compose -f config/docker-compose.yml --profile test down
