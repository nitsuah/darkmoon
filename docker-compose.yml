version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: darkmoon-app
    working_dir: /app
    command: ["npm", "run", "start"]
    ports:
      - "${PORT:-4444}:4444"
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development
    tty: true

  test:
    build:
      context: .
      dockerfile: Dockerfile
    image: darkmoon-app
    working_dir: /app
    command: ["npm", "run", "test"]
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development
    tty: true
